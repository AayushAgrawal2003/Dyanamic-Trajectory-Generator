robot:
  name: "KUKA LBR Med 7"
  base_position: [0.0, -0.5, 0.3]  # x, y, z relative to object
  workspace_inner_radius: 0.3
  workspace_outer_radius: 0.8
  min_camera_angle_to_target: 0.5  # cos(angle) threshold
  forbidden_zones:  # AABBs in world frame
    - min: [-1.0, -1.0, -0.05]
      max: [1.0, 1.0, 0.0]  # table surface
